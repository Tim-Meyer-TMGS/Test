<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Widget Test</title>
  <style>
    :root {
      color-scheme: light;
      font-family: Arial, Helvetica, sans-serif;
      color: #202124;
      background: #f5f7f8;
    }

    body {
      margin: 0;
      min-height: 100vh;
    }

    header {
      background: #ffffff;
      border-bottom: 1px solid #d9dee3;
      padding: 24px;
    }

    main {
      width: min(1120px, calc(100% - 32px));
      margin: 24px auto;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 28px;
      line-height: 1.2;
    }

    p {
      margin: 0;
      color: #5f6368;
      line-height: 1.5;
    }

    .widget-area {
      min-height: 320px;
      margin-top: 24px;
      padding: 24px;
      background: #ffffff;
      border: 1px solid #d9dee3;
      border-radius: 8px;
    }
  </style>
</head>
<body>
  <header>
    <h1>Widget Testseite</h1>
    <p>Fuege den Widget-Code aus dem destination.one Widgetbuilder im markierten Bereich ein.</p>
  </header>

  <main>
    <section class="widget-area" aria-label="Widget Testbereich">
      <!--
        Widget-Code hier einfuegen.

        Beispiel-Aufbau:
        1. Script-Tag aus dem Widgetbuilder einfuegen
        2. Webcomponent-/Widget-Tag aus dem Widgetbuilder einfuegen

        Den kompletten Platzhalter-Kommentar kannst du danach loeschen.
      -->
    </section>
  </main>
</body>
</html>
