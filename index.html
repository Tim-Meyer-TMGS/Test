<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>destination.one Widget Test</title>
  <style>
    :root {
      color-scheme: light;
      font-family: Arial, Helvetica, sans-serif;
      color: #202124;
      background: #f5f7f8;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
    }

    header {
      background: #ffffff;
      border-bottom: 1px solid #d9dee3;
      padding: 24px;
    }

    main {
      width: min(1280px, calc(100% - 32px));
      margin: 24px auto;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 28px;
      line-height: 1.2;
    }

    p {
      margin: 0;
      color: #5f6368;
      line-height: 1.5;
    }

    .widget-shell {
      min-height: 560px;
      margin-top: 24px;
      padding: 16px;
      background: #ffffff;
      border: 1px solid #d9dee3;
      border-radius: 8px;
    }

    done-result-list {
      display: block;
      min-height: 520px;
      --color-scheme-base-background-color: #ffffff;
      --color-scheme-base-color: #000000;
      --color-scheme-base-link-color: #000000;
      --color-scheme-base-link-color-hover: #f70099;
      --color-scheme-container-background-color: #e6e6e6;
      --color-scheme-container-color: #333333;
      --color-scheme-container-link-color: #000000;
      --color-scheme-container-link-color-hover: #f70099;
      --color-scheme-conversion-background-color: #ffffff;
      --color-scheme-conversion-color: #333333;
      --color-scheme-conversion-link-color: #000000;
      --color-scheme-conversion-link-color-hover: #000000;
    }
  </style>
</head>
<body>
  <main>
    <section class="widget-shell" aria-label="destination.one Widget">
      <done-result-list
        layout="card"
        map="half"
        hide-overall-count
        limit="16"
        type="Event"
        sort="intervalFirstMatchSlow"
      ></done-result-list>
    </section>
  </main>

  <script
    type="module"
    src="https://newpages.destination.one/web-components.js"
    data-language="de"
    data-experience="chemnitz-zwickau-region"
    data-template="wlan"
    data-router-mode="history"
    data-base-path="/veranstaltungen"
  ></script>
</body>
</html>
